apiVersion: apps/v1
kind: Deployment
metadata:
  # Dynamically names the deployment based on the installation name
  name: {{ .Release.Name }}-webapp
  namespace: {{ .Release.Namespace }} 
spec:
  # Injects the replica count from values.yaml
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app: {{ .Release.Name }}
    spec:
      containers:
      - name: web-server
        # Dynamically stitches the image and tag together
        image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
        ports:
        - containerPort: {{ .Values.service.port }}