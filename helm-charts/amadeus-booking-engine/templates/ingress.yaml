apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ .Release.Name }}-ingress      # <-- Dynamic Name
  namespace: {{ .Release.Namespace }}    # <-- THE FIX: Explicit Namespace
spec:
  ingressClassName: nginx
  rules:
  - http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: {{ .Release.Name }}-service  # <-- Dynamic Service Link
            port:
              number: 80