name: 'Terraform SRE Pipeline'

on:
  push:
    branches:
      - main # The robot only runs when code hits the main branch

jobs:
  terraform:
    name: 'Deploy Infrastructure'
    runs-on: ubuntu-latest

    steps:
    # 1. Pull the code from your repository
    - name: Checkout Code
      uses: actions/checkout@v4

    # 2. Authenticate the robot to Azure using your secret
    - name: Azure Login
      uses: azure/login@v1
      with:
        creds: ${{ secrets.AZURE_CREDENTIALS }}

    # 3. Install Terraform on the GitHub runner
    - name: Setup Terraform
      uses: hashicorp/setup-terraform@v3

    # 4. The SRE Execution Cycle
    - name: Terraform Init
      run: terraform init

    - name: Terraform Plan
      run: terraform plan -out=tfplan

    - name: Terraform Apply
      run: terraform destroy -auto-approve